<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor de Diagrama de Clases - Mermaid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f1f5f9;
      overflow: hidden;
    }

    #mermaid-viewer-wrapper {
      width: 100%;
      height: 88vh;
      background-color: #ffffff;
      background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);
      background-size: 24px 24px;
      position: relative;
      overflow: hidden;
      border-top: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
      cursor: grab;
      display: block;
    }

    #mermaid-viewer-wrapper:active {
      cursor: grabbing;
    }

    #diagram-target {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .zoom-controls {
      position: absolute;
      bottom: 30px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    .zoom-btn {
      width: 52px;
      height: 52px;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      color: #334155;
    }

    .zoom-btn:hover {
      background: #f8fafc;
      border-color: #3b82f6;
      color: #2563eb;
      transform: scale(1.05);
    }

    .zoom-btn svg {
      width: 24px !important;
      height: 24px !important;
      pointer-events: none;
    }

    .info-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      color: #1e293b;
      border: 1px solid #e2e8f0;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .mermaid {
      display: none;
    }
  </style>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

    mermaid.initialize({
      startOnLoad: false,
      theme: 'neutral',
      securityLevel: 'loose',
      class: {
        useMaxWidth: false,
        htmlLabels: true
      }
    });

    const initializeApp = async () => {
      const container = document.getElementById('diagram-target');
      const sourceCode = document.getElementById('mermaid-source').textContent;

      try {
        // Renderizado manual del diagrama
        const { svg: svgCode } = await mermaid.render('mermaid-svg-id', sourceCode);
        container.innerHTML = svgCode;

        const svgElement = container.querySelector('svg');
        if (svgElement) {
          svgElement.removeAttribute('width');
          svgElement.removeAttribute('height');
          svgElement.style.width = '100%';
          svgElement.style.height = '100%';
          svgElement.style.display = 'block';

          const panZoomInstance = svgPanZoom(svgElement, {
            zoomEnabled: true,
            controlIconsEnabled: false,
            fit: true,
            center: true,
            minZoom: 0.01,
            maxZoom: 50,
            zoomScaleSensitivity: 0.4,
            mouseWheelZoomEnabled: true,
            dblClickZoomEnabled: true,
            preventMouseEventsDefault: true
          });

          panZoomInstance.resize();
          panZoomInstance.fit();
          panZoomInstance.center();

          window.pz = panZoomInstance;

          window.addEventListener('resize', () => {
            panZoomInstance.resize();
            panZoomInstance.fit();
            panZoomInstance.center();
          });
        }
      } catch (error) {
        console.error("Error al procesar el diagrama:", error);
        container.innerHTML = `
                    <div class="flex items-center justify-center h-full p-10 text-center">
                        <div class="bg-red-50 p-6 rounded-lg border border-red-200">
                            <h2 class="text-red-700 font-bold mb-2">Error de Visualización</h2>
                            <p class="text-red-600 text-sm">No se pudo procesar el diagrama debido a una restricción de diseño.</p>
                            <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">Reintentar</button>
                        </div>
                    </div>`;
      }
    };

    window.onload = initializeApp;
  </script>
</head>

<body class="bg-slate-50">
  <header class="py-4 px-6 bg-white border-b border-slate-200">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold text-slate-800 tracking-tight">Arquitectura de Sistema de Exámenes</h1>
      <span class="text-xs font-medium px-2 py-1 bg-slate-100 text-slate-500 rounded uppercase tracking-widest">Diagrama de Clases</span>
    </div>
  </header>

  <main class="relative">
    <div id="mermaid-viewer-wrapper">
      <div class="info-overlay">
        <p><strong>Comandos:</strong> 🖱️ Rueda (Zoom) | 🖐️ Arrastrar (Mover)</p>
      </div>

      <div class="zoom-controls">
        <button onclick="if(window.pz) window.pz.zoomIn()" class="zoom-btn" title="Aumentar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button onclick="if(window.pz) window.pz.zoomOut()" class="zoom-btn" title="Disminuir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button onclick="if(window.pz) { window.pz.fit(); window.pz.center(); }" class="zoom-btn" title="Maximizar / Centrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h6v6"></path>
            <path d="M9 21H3v-6"></path>
            <path d="M21 3l-7 7"></path>
            <path d="M3 21l7-7"></path>
          </svg>
        </button>
      </div>

      <div id="diagram-target"></div>
    </div>
  </main>

  <script id="mermaid-source" type="text/plain">
classDiagram
    direction TB

    namespace Domain_Model {
        class Question {
            <<abstract>>
            #QuestionId id
            #String text
            #AnswerText correctAnswer
            +isCorrect(AnswerText studentAnswer)* boolean
            +displayFormat()* void
        }

        class SingleChoiceQuestion {
            -List~String~ options
            +isCorrect(AnswerText studentAnswer) boolean
            +displayFormat() void
        }

        class TrueFalseQuestion {
            +isCorrect(AnswerText studentAnswer) boolean
            +displayFormat() void
        }

        class FillBlankQuestion {
            +isCorrect(AnswerText studentAnswer) boolean
            +displayFormat() void
        }

        class MultipleChoiceQuestion {
            -List~String~ options
            +isCorrect(AnswerText studentAnswer) boolean
            +displayFormat() void
        }

        class AsociationQuestion {
            -List~String~ option1
            -List~String~ option2
            +isCorrect(AnswerText studentAnswer) boolean
            +displayFormat() void
        }

        class ExamAttempt {
            -StudentId studentId
            -List~Question~ questions
            -Map~QuestionId-AnswerText~ answers
            -boolean isFinished
            -Calificacion result
            +responder(QuestionId qId, AnswerText answer) void
            +finalizar(Calificacion calificacion) void
            +estaFinalizado() boolean
        }
    }

    namespace Domain_Services {
        class AttemptManager {
            -ExamAttemptRepository repository
            +verificarIntentoActivo(StudentId studentId) void
        }

        class GradingService {
            +calificar(ExamAttempt attempt) Calificacion
        }
    }

    namespace Domain_Repository_Interfaces {
        class ExamAttemptRepository {
            <<interface>>
            +findActiveByStudent(StudentId studentId) Optional~ExamAttempt~
            +save(ExamAttempt attempt) void
        }

        class QuestionBankRepository {
            <<interface>>
            +findAll() List~Question~
        }
    }

    namespace Domain_ValueObjects {
        class StudentId { <<record>> +String value }
        class QuestionId { <<record>> +String value }
        class AnswerText { <<record>> +String value }
        class Calificacion { <<record>> +int puntaje, +int total }
    }

    namespace Application {
        class ExamApplicationService {
            -QuestionBankRepository questionRepo
            -ExamAttemptRepository attemptRepo
            -AttemptManager attemptManager
            -GradingService gradingService
            +iniciarExamen(StudentId studentId) ExamAttemptDTO
            +responderPregunta(StudentId studentId, QuestionId qId, AnswerText answer) void
            +finalizarExamen(StudentId studentId) CalificacionDTO
        }

        class ExamAttemptDTO { <<record>> +StudentId studentId, +List~Question~ questions }
        class CalificacionDTO { <<record>> +int puntaje, +int total }
    }

    namespace Infrastructure {
        class CsvQuestionBankRepository {
            -String filePath
            +findAll() List~Question~
            -parseQuestion(String line, int idStr) Question
        }

        class InMemoryExamAttemptRepository {
            -Map~StudentId-ExamAttempt~ db
            +findActiveByStudent(StudentId studentId) Optional~ExamAttempt~
            +save(ExamAttempt attempt) void
        }
    }

    namespace Presentation {
        class ConsoleUI {
            -ExamApplicationService appService
            +start() void
        }

        class SwingUI {
            -ExamApplicationService appService
            +start() void
        }
    }

    Question <|-- SingleChoiceQuestion
    Question <|-- TrueFalseQuestion
    Question <|-- FillBlankQuestion
    Question <|-- MultipleChoiceQuestion
    Question <|-- AsociationQuestion


    ExamAttempt "1" *-- "*" Question : contiene
    ExamAttempt "1" *-- "1" StudentId : pertenece_a
    ExamAttempt "1" *-- "1" Calificacion : resultado

    ExamAttemptRepository <.. InMemoryExamAttemptRepository : implementa
    QuestionBankRepository <.. CsvQuestionBankRepository : implementa

    AttemptManager --> ExamAttemptRepository : utiliza
    ExamApplicationService --> QuestionBankRepository : utiliza
    ExamApplicationService --> ExamAttemptRepository : utiliza
    ExamApplicationService --> AttemptManager : utiliza
    ExamApplicationService --> GradingService : utiliza

    ConsoleUI --> ExamApplicationService : orquesta
    SwingUI --> ExamApplicationService : orquesta

    GradingService ..> ExamAttempt : evalua

    ExamApplicationService ..> ExamAttemptDTO : devuelve
    ExamApplicationService ..> CalificacionDTO : devuelve
    </script>

  <footer class="py-2 text-center text-slate-400 text-[10px] bg-slate-50 border-t border-slate-200 uppercase tracking-widest">
    Motor de Visualización Mermaid v10 & svg-pan-zoom
  </footer>
</body>

</html>
